<!DOCTYPE html>
<html>
<head>
  <title>Kiray</title>

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background-color: #111;
      color: white;
    }

    header {
      background-image: url('https://raw.githubusercontent.com/joaovitorferreirasoaress-coder/Kiray-Fox/main/file_00000000b3e4720e9b63937b8a305405.png');
      background-size: cover;
      background-position: center;
      padding: 80px 20px;
      text-align: center;
    }

    header h1 {
      font-size: 36px;
      background: rgba(0,0,0,0.6);
      display: inline-block;
      padding: 10px 20px;
      border-radius: 10px;
    }

    .produtos {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: 20px;
    }

    .produto {
      background: #1c1c1c;
      margin: 10px;
      padding: 15px;
      border-radius: 10px;
      width: 200px;
      text-align: center;
    }

    .produto img {
      width: 100%;
      border-radius: 10px;
    }

    .produto button {
      margin-top: 10px;
      padding: 10px;
      border: none;
      background: orange;
      color: black;
      font-weight: bold;
      cursor: pointer;
      border-radius: 5px;
    }

    .produto button:hover {
      background: #ff9900;
    }
  </style>
</head>

<body>

<header>
  <h1>Kiray</h1>
</header>

<div class="produtos">

  <div class="produto">
    <img src="https://via.placeholder.com/200">
    <h3>Produto 1</h3>
    <p>Descrição rápida</p>
    <a href="https://seulinkafiliado.com" target="_blank">
      <button>Comprar</button>
    </a>
  </div>

  <div class="produto">
    <img src="https://via.placeholder.com/200">
    <h3>Produto 2</h3>
    <p>Descrição rápida</p>
    <a href="https://seulinkafiliado.com" target="_blank">
      <button>Comprar</button>
    </a>
  </div>

</div>

</body>
</html>
